name: Deploy WAYGO Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy:
    name: Deploy API to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Clone / pull repository on VPS
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} bash << 'ENDSSH'
            set -euo pipefail
            DEPLOY_DIR="/var/www/waygo_backend"
            REPO_URL="https://${{ secrets.GH_PAT }}@github.com/${{ secrets.GH_REPO }}.git"

            if [ -d "$DEPLOY_DIR/.git" ]; then
              echo "==> Pulling latest changes..."
              cd "$DEPLOY_DIR"
              git remote set-url origin "$REPO_URL"
              git fetch --depth=1 origin main
              git reset --hard origin/main
            else
              echo "==> First deploy — cloning repository..."
              git clone --depth=1 "$REPO_URL" "$DEPLOY_DIR"
            fi
            echo "==> Repository ready at $DEPLOY_DIR"
          ENDSSH

      - name: Write .env file on VPS
        env:
          ENV_CONTENT: ${{ secrets.VPS_ENV_FILE }}
        run: |
          printf '%s\n' "$ENV_CONTENT" | \
            ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "cat > /var/www/waygo_backend/backend/.env && echo '==> .env written.'"

      - name: Install dependencies & restart API
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} bash << 'ENDSSH'
            set -euo pipefail
            DEPLOY_DIR="/var/www/waygo_backend"

            echo "==> Updating Python virtual environment..."
            python3 -m venv "$DEPLOY_DIR/venv"
            "$DEPLOY_DIR/venv/bin/pip" install --upgrade pip -q
            "$DEPLOY_DIR/venv/bin/pip" install -r "$DEPLOY_DIR/backend/requirements.txt" -q

            echo "==> Ensuring media directory exists..."
            mkdir -p "$DEPLOY_DIR/backend/media"

            echo "==> Restarting PM2 process api_waygo..."
            pm2 stop api_waygo 2>/dev/null || true
            pm2 delete api_waygo 2>/dev/null || true
            pm2 start "$DEPLOY_DIR/venv/bin/uvicorn" \
              --name api_waygo \
              --interpreter none \
              --cwd "$DEPLOY_DIR/backend" \
              -- app.main:app --host 0.0.0.0 --port 8888 --workers 2
            pm2 save
            pm2 status
            echo "==> Deploy complete!"
          ENDSSH

