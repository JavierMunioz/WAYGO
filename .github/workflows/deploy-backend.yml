name: Deploy WAYGO Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy:
    name: Deploy API to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Clone / pull repository
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            DEPLOY_DIR="/var/www/waygo_backend"
            REPO_URL="https://${{ secrets.GH_PAT }}@github.com/${{ secrets.GH_REPO }}.git"

            if [ -d "$DEPLOY_DIR/.git" ]; then
              echo "==> Pulling latest changes..."
              cd "$DEPLOY_DIR"
              git remote set-url origin "$REPO_URL"
              git fetch --depth=1 origin main
              git reset --hard origin/main
            else
              echo "==> First deploy — cloning repository..."
              [ -f "$DEPLOY_DIR/backend/.env" ] && cp "$DEPLOY_DIR/backend/.env" /tmp/waygo_env_backup
              rm -rf "$DEPLOY_DIR"
              git clone --depth=1 "$REPO_URL" "$DEPLOY_DIR"
              if [ -f /tmp/waygo_env_backup ]; then
                mkdir -p "$DEPLOY_DIR/backend"
                mv /tmp/waygo_env_backup "$DEPLOY_DIR/backend/.env"
              fi
            fi
            echo "==> Repository ready."

      - name: Install dependencies & restart API
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            DEPLOY_DIR="/var/www/waygo_backend"

            echo "==> Updating Python virtual environment..."
            python3 -m venv "$DEPLOY_DIR/venv"
            "$DEPLOY_DIR/venv/bin/pip" install --upgrade pip -q
            "$DEPLOY_DIR/venv/bin/pip" install -r "$DEPLOY_DIR/backend/requirements.txt" -q

            echo "==> Ensuring media directory exists..."
            mkdir -p "$DEPLOY_DIR/backend/media"

            echo "==> Restarting PM2 process api_waygo..."
            pm2 stop api_waygo 2>/dev/null || true
            pm2 delete api_waygo 2>/dev/null || true
            pm2 start "$DEPLOY_DIR/venv/bin/uvicorn" \
              --name api_waygo \
              --interpreter none \
              --cwd "$DEPLOY_DIR/backend" \
              -- app.main:app --host 0.0.0.0 --port 8888 --workers 2
            pm2 save
            pm2 status
            echo "==> Deploy complete!"
